name: macOS Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build macOS bundle and publish release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app bundle
        run: npm run tauri:build

      - name: Prepare release notes
        shell: bash
        run: |
          NOTES_FILE="RELEASE_NOTES_${GITHUB_REF_NAME}.md"
          if [ -f "$NOTES_FILE" ]; then
            cp "$NOTES_FILE" RELEASE_BODY.md
          else
            {
              echo "# Release ${GITHUB_REF_NAME}"
              echo
              echo "Automated release generated by GitHub Actions."
            } > RELEASE_BODY.md
          fi

      - name: Upload macOS artifacts (workflow)
        uses: actions/upload-artifact@v4
        with:
          name: macos-bundles-${{ github.ref_name }}
          path: src-tauri/target/release/bundle/**
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_BODY.md
          files: |
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.app.tar.gz
            src-tauri/target/release/bundle/**/*.app
